<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #343541;
            color: #ececf1;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: #202123;
            border-right: 1px solid #4d4d4f;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #4d4d4f;
        }

        .new-bot-btn {
            width: 100%;
            padding: 0.75rem;
            background: #343541;
            border: 1px solid #565869;
            border-radius: 6px;
            color: #ececf1;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background 0.2s;
        }

        .new-bot-btn:hover {
            background: #40414f;
        }

        .bots-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .bot-item {
            padding: 0.75rem;
            margin-bottom: 0.25rem;
            background: #343541;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .bot-item:hover {
            background: #40414f;
        }

        .bot-item.active {
            background: #40414f;
            border-color: #19c37d;
        }

        .bot-info {
            flex: 1;
            min-width: 0;
        }

        .bot-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bot-model {
            font-size: 0.75rem;
            color: #8e8ea0;
        }

        .bot-actions {
            display: flex;
            gap: 0.25rem;
        }

        .bot-delete {
            padding: 0.25rem 0.5rem;
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .bot-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #202123;
            padding: 1rem 2rem;
            border-bottom: 1px solid #4d4d4f;
            text-align: center;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            padding: 1.5rem;
            border-radius: 8px;
        }

        .message.user {
            background: #343541;
        }

        .message.assistant {
            background: #444654;
        }

        .message-icon {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .message.user .message-icon {
            background: #5436da;
        }

        .message.assistant .message-icon {
            background: #19c37d;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .thinking {
            background: #2d2e3a;
            border-left: 3px solid #8e8ea0;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            border-radius: 4px;
            font-style: italic;
            color: #b4b4b4;
        }

        .thinking-label {
            font-weight: 600;
            color: #8e8ea0;
            margin-bottom: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
        }

        .thinking-label:hover {
            color: #a0a0b0;
        }

        .collapse-icon {
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .collapse-icon.collapsed {
            transform: rotate(-90deg);
        }

        .thinking-content {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .thinking-content.collapsed {
            max-height: 0 !important;
            margin-bottom: 0;
        }

        .answer-label {
            font-weight: 600;
            color: #19c37d;
            margin-bottom: 0.5rem;
        }

        .answer-content {
            line-height: 1.6;
        }

        /* Markdown styles */
        .answer-content code {
            background: #1e1e1e;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .answer-content pre {
            background: #1e1e1e;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5rem 0;
        }

        .answer-content pre code {
            background: none;
            padding: 0;
        }

        .answer-content h1, .answer-content h2, .answer-content h3 {
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .answer-content h1 { font-size: 1.5rem; }
        .answer-content h2 { font-size: 1.3rem; }
        .answer-content h3 { font-size: 1.1rem; }

        .answer-content ul, .answer-content ol {
            margin-left: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .answer-content li {
            margin-bottom: 0.25rem;
        }

        .answer-content blockquote {
            border-left: 3px solid #565869;
            padding-left: 1rem;
            margin: 0.5rem 0;
            color: #b4b4b4;
        }

        .answer-content strong {
            font-weight: 600;
        }

        .answer-content em {
            font-style: italic;
        }

        .answer-content a {
            color: #19c37d;
            text-decoration: none;
        }

        .answer-content a:hover {
            text-decoration: underline;
        }

        .answer-content img {
            max-width: 100%;
            border-radius: 6px;
            margin: 0.5rem 0;
        }



        .input-container {
            padding: 1.5rem 2rem;
            background: #343541;
            border-top: 1px solid #4d4d4f;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .media-preview-container {
            display: none;
            gap: 0.5rem;
            padding: 0.5rem;
            background: #40414f;
            border: 1px solid #565869;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            margin: 0 auto;
            max-width: 800px;
            flex-wrap: wrap;
        }

        .media-preview-container.active {
            display: flex;
        }

        .image-preview {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #565869;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .audio-preview {
            position: relative;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: #343541;
            border: 1px solid #565869;
            border-radius: 4px;
            min-width: 200px;
        }

        .audio-preview-icon {
            width: 32px;
            height: 32px;
            background: #19c37d;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .audio-preview-info {
            flex: 1;
            min-width: 0;
        }

        .audio-preview-name {
            font-size: 0.85rem;
            color: #ececf1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audio-preview-size {
            font-size: 0.75rem;
            color: #8e8ea0;
        }

        .media-preview-remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 1;
        }

        .media-preview-remove:hover {
            background: rgba(239, 68, 68, 0.9);
        }

        #messageInput {
            width: 100%;
            padding: 1rem 7rem 1rem 6rem;
            background: #40414f;
            border: 1px solid #565869;
            border-radius: 8px;
            color: #ececf1;
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 50px;
            max-height: 200px;
        }

        .input-wrapper.has-media #messageInput {
            border-radius: 0 0 8px 8px;
        }

        #messageInput:focus {
            border-color: #8e8ea0;
        }

        .media-buttons {
            position: absolute;
            left: 0.5rem;
            bottom: 0.75rem;
            display: flex;
            gap: 0.25rem;
        }

        .media-button {
            background: transparent;
            border: 1px solid #565869;
            color: #8e8ea0;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .media-button:hover {
            background: #565869;
            color: #ececf1;
        }

        #imageInput, #audioInput {
            display: none;
        }

        #sendButton {
            position: absolute;
            right: 0.5rem;
            bottom: 0.75rem;
            background: #19c37d;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            background: #1a9d6a;
        }

        #sendButton:disabled {
            background: #565869;
            cursor: not-allowed;
        }

        .message-media {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
            flex-direction: column;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message-image:hover {
            transform: scale(1.05);
        }

        .message-audio {
            background: #2d2e3a;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid #565869;
            max-width: 400px;
        }

        .message-audio audio {
            width: 100%;
            height: 32px;
        }

        .message-audio audio::-webkit-media-controls-panel {
            background: #343541;
        }

        .message-audio audio::-webkit-media-controls-play-button,
        .message-audio audio::-webkit-media-controls-current-time-display,
        .message-audio audio::-webkit-media-controls-time-remaining-display {
            color: #ececf1;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ececf1;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #343541;
        }

        ::-webkit-scrollbar-thumb {
            background: #565869;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6e6e80;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #343541;
            padding: 2rem;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #4d4d4f;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #b4b4b4;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            background: #40414f;
            border: 1px solid #565869;
            border-radius: 6px;
            color: #ececf1;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: #8e8ea0;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: #19c37d;
            color: white;
        }

        .btn-primary:hover {
            background: #1a9d6a;
        }

        .btn-secondary {
            background: #565869;
            color: #ececf1;
        }

        .btn-secondary:hover {
            background: #6e6e80;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="new-bot-btn" id="newBotBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                New Bot
            </button>
        </div>
        <div class="bots-list" id="botsList"></div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-content">
                <h1 id="headerTitle">Ollama Chat</h1>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-icon">AI</div>
                <div class="message-content">Hello! I'm your AI assistant powered by Ollama 🤖

I can help you with various tasks and access browser storage tools like localStorage, sessionStorage, and cookies.

Feel free to ask me anything!</div>
            </div>
        </div>

        <div class="input-container">
            <div class="media-preview-container" id="mediaPreviewContainer"></div>
            <div class="input-wrapper" id="inputWrapper">
                <input type="file" id="imageInput" accept="image/*" multiple style="display: none;">
                <input type="file" id="audioInput" accept="audio/*" multiple style="display: none;">
                <div class="media-buttons">
                    <button id="imageButton" class="media-button" title="Add images">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                            <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button id="audioButton" class="media-button" title="Add audio">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke="currentColor" stroke-width="2"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <textarea id="messageInput" placeholder="Send a message..." rows="1"></textarea>
                <button id="sendButton">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- New Bot Modal -->
    <div class="modal" id="newBotModal">
        <div class="modal-content">
            <h2 class="modal-title">Create New Bot</h2>
            <div class="form-group">
                <label class="form-label" for="botName">Bot Name</label>
                <input type="text" id="botName" class="form-input" placeholder="My Assistant">
            </div>
            <div class="form-group">
                <label class="form-label" for="botModel">Model</label>
                <input type="text" id="botModel" class="form-input" placeholder="gemma4:e4b">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelBotBtn">Cancel</button>
                <button class="btn btn-primary" id="createBotBtn">Create</button>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "whatwg-fetch": "https://cdn.jsdelivr.net/npm/whatwg-fetch@3.6.20/+esm",
            "ollama": "/node_modules/ollama/dist/browser.mjs"
        }
    }
    </script>
    <script type="module">
        import ollama from 'ollama';

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const botsList = document.getElementById('botsList');
        const newBotBtn = document.getElementById('newBotBtn');
        const newBotModal = document.getElementById('newBotModal');
        const botNameInput = document.getElementById('botName');
        const botModelInput = document.getElementById('botModel');
        const createBotBtn = document.getElementById('createBotBtn');
        const cancelBotBtn = document.getElementById('cancelBotBtn');
        const headerTitle = document.getElementById('headerTitle');
        const imageButton = document.getElementById('imageButton');
        const imageInput = document.getElementById('imageInput');
        const audioButton = document.getElementById('audioButton');
        const audioInput = document.getElementById('audioInput');
        const mediaPreviewContainer = document.getElementById('mediaPreviewContainer');
        const inputWrapper = document.getElementById('inputWrapper');

        let conversationHistory = [];
        let currentBotId = null;
        let bots = {};
        let selectedImages = [];
        let selectedAudio = [];

        // Simple markdown parser (no external dependencies)
        function parseMarkdown(text) {
            if (!text) return '';

            let html = text;

            // Code blocks (```)
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });

            // Inline code (`)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold (**text** or __text__)
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

            // Italic (*text* or _text_)
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Links [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Lists
            html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Media handling functions
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    // Remove the data:xxx;base64, prefix
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        async function handleImageSelect(event) {
            const files = Array.from(event.target.files);

            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    const base64 = await fileToBase64(file);
                    selectedImages.push({
                        type: 'image',
                        file: file,
                        base64: base64,
                        preview: URL.createObjectURL(file)
                    });
                }
            }

            updateMediaPreviews();
            imageInput.value = ''; // Reset input
        }

        async function handleAudioSelect(event) {
            const files = Array.from(event.target.files);

            for (const file of files) {
                if (file.type.startsWith('audio/')) {
                    const base64 = await fileToBase64(file);
                    selectedAudio.push({
                        type: 'audio',
                        file: file,
                        base64: base64,
                        preview: URL.createObjectURL(file),
                        name: file.name,
                        size: formatFileSize(file.size)
                    });
                }
            }

            updateMediaPreviews();
            audioInput.value = ''; // Reset input
        }

        function updateMediaPreviews() {
            const hasMedia = selectedImages.length > 0 || selectedAudio.length > 0;

            if (hasMedia) {
                mediaPreviewContainer.classList.add('active');
                inputWrapper.classList.add('has-media');

                let html = '';

                // Add image previews
                html += selectedImages.map((img, index) => `
                    <div class="image-preview">
                        <img src="${img.preview}" alt="Preview">
                        <button class="media-preview-remove" onclick="removeMedia('image', ${index})">×</button>
                    </div>
                `).join('');

                // Add audio previews
                html += selectedAudio.map((audio, index) => `
                    <div class="audio-preview">
                        <div class="audio-preview-icon">🎵</div>
                        <div class="audio-preview-info">
                            <div class="audio-preview-name">${audio.name}</div>
                            <div class="audio-preview-size">${audio.size}</div>
                        </div>
                        <button class="media-preview-remove" onclick="removeMedia('audio', ${index})">×</button>
                    </div>
                `).join('');

                mediaPreviewContainer.innerHTML = html;
            } else {
                mediaPreviewContainer.classList.remove('active');
                inputWrapper.classList.remove('has-media');
                mediaPreviewContainer.innerHTML = '';
            }
        }

        window.removeMedia = function(type, index) {
            if (type === 'image') {
                URL.revokeObjectURL(selectedImages[index].preview);
                selectedImages.splice(index, 1);
            } else if (type === 'audio') {
                URL.revokeObjectURL(selectedAudio[index].preview);
                selectedAudio.splice(index, 1);
            }
            updateMediaPreviews();
        };

        // Bot management functions
        function saveBots() {
            localStorage.setItem('ollama_bots', JSON.stringify(bots));
        }

        function loadBots() {
            const saved = localStorage.getItem('ollama_bots');
            if (saved) {
                bots = JSON.parse(saved);
            } else {
                // Create default bot
                const defaultBot = {
                    id: generateId(),
                    name: 'Default Bot',
                    model: 'gemma4:e4b',
                    history: [],
                    createdAt: Date.now()
                };
                bots[defaultBot.id] = defaultBot;
                currentBotId = defaultBot.id;
                saveBots();
            }

            if (!currentBotId && Object.keys(bots).length > 0) {
                currentBotId = Object.keys(bots)[0];
            }
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createBot(name, model) {
            const bot = {
                id: generateId(),
                name: name || 'New Bot',
                model: model || 'gemma4:e4b',
                history: [],
                createdAt: Date.now()
            };
            bots[bot.id] = bot;
            saveBots();
            return bot;
        }

        function deleteBot(botId) {
            if (Object.keys(bots).length <= 1) {
                alert('Cannot delete the last bot!');
                return;
            }

            if (confirm('Are you sure you want to delete this bot and its conversation history?')) {
                delete bots[botId];

                if (currentBotId === botId) {
                    currentBotId = Object.keys(bots)[0];
                    switchToBot(currentBotId);
                }

                saveBots();
                renderBotsList();
            }
        }

        function switchToBot(botId) {
            currentBotId = botId;
            const bot = bots[botId];
            conversationHistory = bot.history || [];

            // Update header
            headerTitle.textContent = bot.name;

            // Clear and reload chat
            renderChat();
            renderBotsList();
        }

        function saveCurrentBotHistory() {
            if (currentBotId && bots[currentBotId]) {
                bots[currentBotId].history = conversationHistory;
                saveBots();
            }
        }

        function renderBotsList() {
            botsList.innerHTML = '';

            const sortedBots = Object.values(bots).sort((a, b) => b.createdAt - a.createdAt);

            sortedBots.forEach(bot => {
                const botItem = document.createElement('div');
                botItem.className = `bot-item ${bot.id === currentBotId ? 'active' : ''}`;

                botItem.innerHTML = `
                    <div class="bot-info">
                        <div class="bot-name">${bot.name}</div>
                        <div class="bot-model">${bot.model}</div>
                    </div>
                    <div class="bot-actions">
                        <button class="bot-delete" data-bot-id="${bot.id}">×</button>
                    </div>
                `;

                botItem.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('bot-delete')) {
                        switchToBot(bot.id);
                    }
                });

                const deleteBtn = botItem.querySelector('.bot-delete');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteBot(bot.id);
                });

                botsList.appendChild(botItem);
            });
        }

        function renderChat() {
            chatContainer.innerHTML = '';

            // Add welcome message if no history
            if (conversationHistory.length === 0) {
                const welcomeMsg = document.createElement('div');
                welcomeMsg.className = 'message assistant';
                welcomeMsg.innerHTML = `
                    <div class="message-icon">AI</div>
                    <div class="message-content">Hello! I'm your AI assistant powered by Ollama 🤖

I can help you with various tasks and access browser storage tools like localStorage, sessionStorage, and cookies.

You can also send images for analysis and audio for transcription!

Feel free to ask me anything!</div>
                `;
                chatContainer.appendChild(welcomeMsg);
            } else {
                // Render conversation history
                conversationHistory.forEach(msg => {
                    if (msg.role === 'user' || msg.role === 'assistant') {
                        // Handle different content formats
                        let textContent = '';
                        let media = { images: [] };

                        if (typeof msg.content === 'string') {
                            textContent = msg.content;

                            // Handle standard images format
                            if (msg.images) {
                                // Images in history are base64, convert to blob URLs for display
                                media.images = msg.images.map(base64 => {
                                    return `data:image/jpeg;base64,${base64}`;
                                });
                            }

                            // Handle audio stored in our custom format
                            if (msg._hasAudio && msg._audioFiles) {
                                media.images = msg._audioFiles.map(base64 => {
                                    return `data:audio/wav;base64,${base64}`;
                                });
                            }
                            if (msg._hasAudio && msg._imageFiles) {
                                media.images = msg._imageFiles.map(base64 => {
                                    return `data:image/jpeg;base64,${base64}`;
                                });
                            }
                        } else if (Array.isArray(msg.content)) {
                            msg.content.forEach(item => {
                                if (item.type === 'text') {
                                    textContent = item.text;
                                } else if (item.type === 'image') {
                                    media.images.push(`data:image/jpeg;base64,${item.image}`);
                                } else if (item.type === 'audio') {
                                    media.audio.push(`data:audio/wav;base64,${item.audio}`);
                                }
                            });
                        }

                        addMessage(textContent, msg.role, false, media);
                    }
                });
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Media upload handlers
        imageButton.addEventListener('click', () => {
            imageInput.click();
        });

        audioButton.addEventListener('click', () => {
            audioInput.click();
        });

        imageInput.addEventListener('change', handleImageSelect);
        audioInput.addEventListener('change', handleAudioSelect);

        // Modal handlers
        newBotBtn.addEventListener('click', () => {
            newBotModal.classList.add('show');
            botNameInput.value = '';
            botModelInput.value = 'gemma4:e4b';
            botNameInput.focus();
        });

        cancelBotBtn.addEventListener('click', () => {
            newBotModal.classList.remove('show');
        });

        createBotBtn.addEventListener('click', () => {
            const name = botNameInput.value.trim();
            const model = botModelInput.value.trim();

            if (!name) {
                alert('Please enter a bot name');
                return;
            }

            const bot = createBot(name, model);
            switchToBot(bot.id);
            renderBotsList();
            newBotModal.classList.remove('show');
        });

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && newBotModal.classList.contains('show')) {
                newBotModal.classList.remove('show');
            }
        });

        // Initialize
        loadBots();
        renderBotsList();
        renderChat();

        // Browser storage tools
        const tools = [
            {
                type: "function",
                function: {
                    name: "get_local_storage",
                    description: "Get a value from localStorage by key",
                    parameters: {
                        type: "object",
                        required: ["key"],
                        properties: {
                            key: { type: "string", description: "The localStorage key to retrieve" }
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "set_local_storage",
                    description: "Set a value in localStorage",
                    parameters: {
                        type: "object",
                        required: ["key", "value"],
                        properties: {
                            key: { type: "string", description: "The localStorage key" },
                            value: { type: "string", description: "The value to store" }
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "remove_local_storage",
                    description: "Remove a key from localStorage",
                    parameters: {
                        type: "object",
                        required: ["key"],
                        properties: {
                            key: { type: "string", description: "The localStorage key to remove" }
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "list_local_storage",
                    description: "List all keys and values in localStorage",
                    parameters: {
                        type: "object",
                        properties: {}
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "get_session_storage",
                    description: "Get a value from sessionStorage by key",
                    parameters: {
                        type: "object",
                        required: ["key"],
                        properties: {
                            key: { type: "string", description: "The sessionStorage key to retrieve" }
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "set_session_storage",
                    description: "Set a value in sessionStorage",
                    parameters: {
                        type: "object",
                        required: ["key", "value"],
                        properties: {
                            key: { type: "string", description: "The sessionStorage key" },
                            value: { type: "string", description: "The value to store" }
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "list_session_storage",
                    description: "List all keys and values in sessionStorage",
                    parameters: {
                        type: "object",
                        properties: {}
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "get_cookies",
                    description: "Get all cookies for the current domain",
                    parameters: {
                        type: "object",
                        properties: {}
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "set_cookie",
                    description: "Set a cookie",
                    parameters: {
                        type: "object",
                        required: ["name", "value"],
                        properties: {
                            name: { type: "string", description: "Cookie name" },
                            value: { type: "string", description: "Cookie value" },
                            days: { type: "number", description: "Days until expiration (optional)" }
                        }
                    }
                }
            },
            {
                type: "function",
                function: {
                    name: "clear_storage",
                    description: "Clear all storage (localStorage, sessionStorage, and cookies)",
                    parameters: {
                        type: "object",
                        properties: {}
                    }
                }
            }
        ];





        // Tool execution functions
        async function executeToolCall(toolCall) {
            const functionName = toolCall.function.name;
            const args = toolCall.function.arguments;

            switch(functionName) {
                case 'get_local_storage':
                    return localStorage.getItem(args.key);

                case 'set_local_storage':
                    localStorage.setItem(args.key, args.value);
                    return `Successfully set ${args.key} in localStorage`;

                case 'remove_local_storage':
                    localStorage.removeItem(args.key);
                    return `Successfully removed ${args.key} from localStorage`;

                case 'list_local_storage':
                    const localItems = {};
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        localItems[key] = localStorage.getItem(key);
                    }
                    return JSON.stringify(localItems, null, 2);

                case 'get_session_storage':
                    return sessionStorage.getItem(args.key);

                case 'set_session_storage':
                    sessionStorage.setItem(args.key, args.value);
                    return `Successfully set ${args.key} in sessionStorage`;

                case 'list_session_storage':
                    const sessionItems = {};
                    for (let i = 0; i < sessionStorage.length; i++) {
                        const key = sessionStorage.key(i);
                        sessionItems[key] = sessionStorage.getItem(key);
                    }
                    return JSON.stringify(sessionItems, null, 2);

                case 'get_cookies':
                    const cookies = document.cookie.split(';').reduce((acc, cookie) => {
                        const [name, value] = cookie.trim().split('=');
                        if (name) acc[name] = decodeURIComponent(value);
                        return acc;
                    }, {});
                    return JSON.stringify(cookies, null, 2);

                case 'set_cookie':
                    let cookieString = `${args.name}=${encodeURIComponent(args.value)}`;
                    if (args.days) {
                        const date = new Date();
                        date.setTime(date.getTime() + (args.days * 24 * 60 * 60 * 1000));
                        cookieString += `; expires=${date.toUTCString()}`;
                    }
                    cookieString += '; path=/';
                    document.cookie = cookieString;
                    return `Successfully set cookie ${args.name}`;

                case 'clear_storage':
                    localStorage.clear();
                    sessionStorage.clear();
                    document.cookie.split(';').forEach(cookie => {
                        const name = cookie.split('=')[0].trim();
                        document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
                    });
                    return 'Successfully cleared all storage';

                default:
                    return `Unknown function: ${functionName}`;
            }
        }



        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Send message on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendButton.addEventListener('click', sendMessage);

        async function sendMessage() {
            const message = messageInput.value.trim();
            const hasMedia = selectedImages.length > 0 || selectedAudio.length > 0;

            if (!message && !hasMedia) return;

            // Prepare media for message
            const mediaPreviewUrls = { images: [], audio: [] };
            mediaPreviewUrls.images = selectedImages.map(img => img.preview);
            mediaPreviewUrls.audio = selectedAudio.map(audio => audio.preview);

            // Add user message with media
            addMessage(message, 'user', false, mediaPreviewUrls);

            // Build message content in Ollama format
            let userMessage = { role: 'user' };

            // Ollama treats audio and images the same - both go in the 'images' array
            if (selectedAudio.length > 0) {
                // If audio is present, prompt for transcription
                userMessage.content = message || 'Transcribe the audio';

                // Combine audio and images in the images array (Ollama treats them the same)
                const allMedia = [
                    ...selectedAudio.map(a => a.base64),
                    ...selectedImages.map(i => i.base64)
                ];

                if (allMedia.length > 0) {
                    userMessage.images = allMedia;
                }

                // Store metadata for display purposes
                userMessage._hasAudio = true;
                userMessage._audioFiles = selectedAudio.map(a => a.base64);
                userMessage._imageFiles = selectedImages.map(i => i.base64);
            } else if (selectedImages.length > 0) {
                // Images only
                userMessage.content = message || 'What is in this image?';
                userMessage.images = selectedImages.map(img => img.base64);
            } else {
                // Text only
                userMessage.content = message;
            }

            conversationHistory.push(userMessage);
            saveCurrentBotHistory();

            // Clear input and media
            messageInput.value = '';
            messageInput.style.height = 'auto';
            const audioFiles = [...selectedAudio];
            const imageFiles = [...selectedImages];
            selectedImages = [];
            selectedAudio = [];
            updateMediaPreviews();
            sendButton.disabled = true;

            // Add loading message
            const loadingDiv = addMessage('', 'assistant', true);

            const currentModel = bots[currentBotId]?.model || 'gemma4:e4b';

            try {
                // Use standard ollama.chat for text, images, and audio
                const stream = await ollama.chat({
                    model: currentModel,
                    messages: conversationHistory,
                    tools: tools,
                    stream: true,
                });

                let inThinking = false;
                let content = '';
                let thinking = '';

                // Remove loading indicator
                loadingDiv.remove();
                const assistantDiv = addMessage('', 'assistant');
                const contentDiv = assistantDiv.querySelector('.message-content');

                let toolCalls = [];

                let thinkingContentDiv = null;
                let answerContentDiv = null;

                for await (const chunk of stream) {
                    if (chunk.message.thinking) {
                        if (!inThinking) {
                            inThinking = true;
                            // Add thinking section
                            const thinkingDiv = document.createElement('div');
                            thinkingDiv.className = 'thinking';
                            const thinkingLabel = document.createElement('div');
                            thinkingLabel.className = 'thinking-label';
                            thinkingLabel.innerHTML = '<span class="collapse-icon">▼</span> 💭 Thinking:';

                            // Make thinking collapsible
                            thinkingLabel.onclick = () => {
                                const icon = thinkingLabel.querySelector('.collapse-icon');
                                const isCollapsed = thinkingContentDiv.classList.toggle('collapsed');
                                icon.classList.toggle('collapsed', isCollapsed);
                            };

                            thinkingDiv.appendChild(thinkingLabel);
                            thinkingContentDiv = document.createElement('div');
                            thinkingContentDiv.className = 'thinking-content';
                            thinkingContentDiv.style.maxHeight = '1000px';
                            thinkingDiv.appendChild(thinkingContentDiv);
                            contentDiv.appendChild(thinkingDiv);
                        }
                        // Accumulate and display thinking
                        thinking += chunk.message.thinking;
                        if (thinkingContentDiv) {
                            thinkingContentDiv.textContent = thinking;
                        }
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    } else if (chunk.message.content) {
                        if (inThinking) {
                            inThinking = false;
                            // Add answer label
                            const answerLabel = document.createElement('div');
                            answerLabel.className = 'answer-label';
                            answerLabel.textContent = '💬 Answer:';
                            contentDiv.appendChild(answerLabel);

                            // Add answer content container
                            answerContentDiv = document.createElement('div');
                            answerContentDiv.className = 'answer-content';
                            contentDiv.appendChild(answerContentDiv);
                        }
                        // Accumulate and display content with markdown
                        content += chunk.message.content;
                        if (answerContentDiv) {
                            answerContentDiv.innerHTML = parseMarkdown(content);
                        } else {
                            // If no thinking, just show content directly with markdown
                            if (!contentDiv.querySelector('.message-images')) {
                                contentDiv.innerHTML = parseMarkdown(content);
                            } else {
                                // Preserve images
                                const textDiv = contentDiv.querySelector('div:not(.message-images)');
                                if (textDiv) {
                                    textDiv.innerHTML = parseMarkdown(content);
                                } else {
                                    const newTextDiv = document.createElement('div');
                                    newTextDiv.innerHTML = parseMarkdown(content);
                                    contentDiv.appendChild(newTextDiv);
                                }
                            }
                        }
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    } else if (chunk.message.tool_calls) {
                        toolCalls = chunk.message.tool_calls;
                    }
                }

                // Handle tool calls if any
                if (toolCalls && toolCalls.length > 0) {
                    // Add assistant message with tool calls to history
                    conversationHistory.push({
                        role: 'assistant',
                        thinking: thinking,
                        content: content,
                        tool_calls: toolCalls
                    });

                    // Show tool execution
                    const toolDiv = document.createElement('div');
                    toolDiv.className = 'thinking';
                    toolDiv.innerHTML = '<div class="thinking-label">🔧 Executing tools...</div>';
                    contentDiv.appendChild(toolDiv);

                    // Execute all tool calls
                    for (const toolCall of toolCalls) {
                        const result = await executeToolCall(toolCall);

                        // Add tool result to conversation
                        conversationHistory.push({
                            role: 'tool',
                            content: result
                        });

                        // Display tool result
                        const toolResultDiv = document.createElement('div');
                        toolResultDiv.style.marginTop = '0.5rem';
                        toolResultDiv.innerHTML = `<strong>${toolCall.function.name}:</strong> ${result}`;
                        toolDiv.appendChild(toolResultDiv);
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }

                    chatContainer.scrollTop = chatContainer.scrollHeight;

                    // Get final response after tool execution
                    const finalStream = await ollama.chat({
                        model: currentModel,
                        messages: conversationHistory,
                        tools: tools,
                        stream: true,
                    });

                    let finalContent = '';
                    const finalDiv = addMessage('', 'assistant');
                    const finalContentDiv = finalDiv.querySelector('.message-content');

                    for await (const chunk of finalStream) {
                        if (chunk.message.content) {
                            finalContent += chunk.message.content;
                            finalContentDiv.innerHTML = parseMarkdown(finalContent);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    }

                    conversationHistory.push({
                        role: 'assistant',
                        content: finalContent
                    });
                } else {
                    // No tool calls, just add the normal message
                    conversationHistory.push({
                        role: 'assistant',
                        thinking: thinking,
                        content: content
                    });
                }

                // Save conversation history after response
                saveCurrentBotHistory();

            } catch (error) {
                loadingDiv.remove();
                addMessage('Error: ' + error.message + '\nMake sure Ollama is running on http://localhost:11434', 'assistant');
                console.error('Error:', error);
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        function addMessage(content, role, isLoading = false, media = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const iconDiv = document.createElement('div');
            iconDiv.className = 'message-icon';
            iconDiv.textContent = role === 'user' ? 'U' : 'AI';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (isLoading) {
                contentDiv.innerHTML = '<span class="loading"></span>';
            } else {
                // Add media if present
                if (media) {
                    const mediaDiv = document.createElement('div');
                    mediaDiv.className = 'message-media';

                    // Add images
                    if (media.images && media.images.length > 0) {
                        media.images.forEach(imgUrl => {
                            const img = document.createElement('img');
                            img.className = 'message-image';
                            img.src = imgUrl;
                            img.onclick = () => window.open(imgUrl, '_blank');
                            mediaDiv.appendChild(img);
                        });
                    }

                    // Add audio players
                    if (media.audio && media.audio.length > 0) {
                        media.audio.forEach(audioUrl => {
                            const audioContainer = document.createElement('div');
                            audioContainer.className = 'message-audio';
                            const audio = document.createElement('audio');
                            audio.controls = true;
                            audio.src = audioUrl;
                            audioContainer.appendChild(audio);
                            mediaDiv.appendChild(audioContainer);
                        });
                    }

                    if (mediaDiv.children.length > 0) {
                        contentDiv.appendChild(mediaDiv);
                    }
                }

                // Add text content
                if (content) {
                    const textDiv = document.createElement('div');
                    textDiv.textContent = content;
                    contentDiv.appendChild(textDiv);
                }
            }

            messageDiv.appendChild(iconDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            return messageDiv;
        }
    </script>
